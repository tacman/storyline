<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storyline Local Launcher</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f4f7fa;
      color: #202733;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(720px, 100%);
      background: #ffffff;
      border: 1px solid #d9e0ea;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 8px 24px rgb(32 39 51 / 10%);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 16px;
      color: #586273;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    li {
      margin: 8px 0;
    }

    a {
      color: #245d7c;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }

    code {
      background: #eef2f7;
      border: 1px solid #d9e0ea;
      border-radius: 5px;
      padding: 2px 5px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Storyline Local Launcher</h1>
    <p>Use this page while running <code>php -S 127.0.0.1:8000 -t .</code>.</p>
    <ul>
      <li><a href="/demo/static/index.html">Static JSON demo</a></li>
    </ul>
  </main>
</body>
</html>
